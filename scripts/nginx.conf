##
# InSync Physical Therapy — Nginx Server Block
# Place at: /etc/nginx/sites-available/insync-pt.com
# Enable:   ln -s /etc/nginx/sites-available/insync-pt.com /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
##

server {
    listen 80;
    listen [::]:80;
    server_name insync-pt.com www.insync-pt.com;

    # Security headers (Cloudflare handles HTTPS — server speaks plain HTTP to CF)
    # X-Frame-Options removed so the site can be embedded in Felix's portfolio.
    # frame-ancestors below is the modern CSP-based replacement.
    add_header Content-Security-Policy "frame-ancestors *" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Next.js static assets — long cache, served directly by nginx for speed
    location /_next/static/ {
        alias /var/www/insync/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Clinic photos + badge logos — served as static files, long cache
    location /assets/ {
        alias /var/www/insync/assets/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Public folder (favicon, apple-touch-icon, etc.)
    location /public/ {
        alias /var/www/insync/public/;
        expires 7d;
        access_log off;
    }

    # Everything else → Next.js app on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
